<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, height=device-height, initial-scale=1"
    />
    <title>Background</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
      }

      #bgPattern {
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.08; /* adjust strength */
        background-image:
          linear-gradient(90deg, #888 1px, transparent 1px),
          linear-gradient(#888 1px, transparent 1px);
        background-size: 8px 8px; /* pixel size */
      }
    </style>
  </head>
  <body>
    <div id="bgPattern"></div>
  </body>
</html>
